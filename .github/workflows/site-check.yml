name: Site check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Validate recovery content
        run: ruby scripts/validate_recovery.rb
      - name: Build Jekyll site
        run: bundle exec jekyll build --trace
